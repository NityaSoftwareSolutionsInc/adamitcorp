# Nginx reverse proxy for Adam IT Corp (Next.js)
# Install: copy to /etc/nginx/sites-available/adamitcorp
# Enable:  ln -s /etc/nginx/sites-available/adamitcorp /etc/nginx/sites-enabled/
# Reload:  sudo nginx -t && sudo systemctl reload nginx

upstream nextjs_adamitcorp {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name adamitcorp.com www.adamitcorp.com;

    # Redirect HTTP → HTTPS (uncomment after SSL is set up)
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    location /_next/static/ {
        proxy_pass http://nextjs_adamitcorp;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nextjs_adamitcorp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

