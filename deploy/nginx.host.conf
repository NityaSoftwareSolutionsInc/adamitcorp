# Host Nginx for Adam IT Corp
# Proxies public :80/:443 → Docker nginx on 127.0.0.1:8080
#
# Install:
#   sudo cp deploy/nginx.host.conf /etc/nginx/sites-available/adamitcorp
#   sudo ln -sf /etc/nginx/sites-available/adamitcorp /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d adamitcorp.com -d www.adamitcorp.com

# HTTP → HTTPS (Certbot may adjust this after first run)
server {
    listen 80;
    listen [::]:80;
    server_name adamitcorp.com www.adamitcorp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://adamitcorp.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name adamitcorp.com www.adamitcorp.com;

    # Certbot paths — update if your cert name differs
    ssl_certificate     /etc/letsencrypt/live/adamitcorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adamitcorp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Prefer apex; avoid Cloudflare + Nginx both forcing www (redirect loops)
    if ($host = www.adamitcorp.com) {
        return 301 https://adamitcorp.com$request_uri;
    }

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
