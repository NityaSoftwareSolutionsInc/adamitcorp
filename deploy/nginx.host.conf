# Host Nginx for Adam IT Corp
# Proxies :80/:443 → Docker on 127.0.0.1:8080
#
# IMPORTANT: Do NOT also force www↔apex in Cloudflare.
# Pick ONE place for canonical host redirects, or you get ERR_TOO_MANY_REDIRECTS.
# Cloudflare SSL/TLS must be "Full (strict)" — not Flexible.

# HTTP — ACME + redirect to HTTPS (same host, no www flip)
server {
    listen 80;
    listen [::]:80;
    server_name adamitcorp.com www.adamitcorp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy only (no host redirect here)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name adamitcorp.com www.adamitcorp.com;

    ssl_certificate     /etc/letsencrypt/live/adamitcorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adamitcorp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
