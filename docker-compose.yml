services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adamitcorp-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3010"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://adamitcorp.com}
    # Internal only — not published on the host (avoids conflict with d3e :3000)
    expose:
      - "3010"
    networks:
      - adamitcorp

  nginx:
    image: nginx:1.27-alpine
    container_name: adamitcorp-nginx
    restart: unless-stopped
    # Host :80/:443 used by d3e-nginx — use 8080 instead
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - adamitcorp

networks:
  adamitcorp:
    driver: bridge
